# ORGA Underground Academia — Nginx Configuration
# Enhanced Alice v2.0 Level 3 Cartouche Autonome Infrastructure Deployment
# Target: /home/deploy/orga/nginx-orga.conf

server {
    listen 80;
    server_name underground.folkup.life;

    # Document root - Astro static build
    root /usr/share/nginx/html;
    index index.html;

    # Charset and compression
    charset utf-8;
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json font/woff2;

    # Security headers — Banking-level compliance
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # CSP for Underground Academia platform
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; media-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # HSTS (will be added by nginx-proxy for HTTPS)
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Underground Academia branding
    add_header X-Powered-By "Underground Academia Research Platform" always;
    add_header X-Investigation-Framework "Cultural Seismography v2.0" always;

    # Astro static files optimization
    location / {
        try_files $uri $uri/ /index.html;

        # Cache static assets
        location ~* \.(css|js|woff2|woff|ttf|eot|svg|png|jpg|jpeg|gif|ico)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header Vary Accept-Encoding;
        }

        # Cache HTML with shorter expiry
        location ~* \.html$ {
            expires 1h;
            add_header Cache-Control "public, must-revalidate";
        }
    }

    # Audio files for Cultural Seismography framework
    location /audio/ {
        expires 30d;
        add_header Cache-Control "public";
        add_header Content-Type "audio/mpeg";
    }

    # Framework and methodology documents
    location /framework/ {
        expires 24h;
        add_header Cache-Control "public";
        add_header Content-Type "text/markdown; charset=utf-8";
    }

    # Investigation assets
    location /investigations/ {
        try_files $uri $uri/ =404;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Icons and UI assets
    location /icons/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Content-Type "image/svg+xml";
    }

    # Security.txt for responsible disclosure
    location /.well-known/security.txt {
        expires 7d;
        add_header Content-Type "text/plain; charset=utf-8";
    }

    # Block access to sensitive files
    location ~ /\. {
        deny all;
    }

    location ~ ~$ {
        deny all;
    }

    location ~ \.md$ {
        # Allow framework documents but block others
        location ~ ^/framework/.+\.md$ {
            try_files $uri =404;
            add_header Content-Type "text/markdown; charset=utf-8";
        }
        # Block all other .md files
        deny all;
    }

    # Error pages with Underground Academia branding
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;

    location = /404.html {
        internal;
        add_header Content-Type "text/html; charset=utf-8";
    }

    location = /50x.html {
        internal;
        add_header Content-Type "text/html; charset=utf-8";
    }

    # Logging
    access_log /var/log/nginx/orga_access.log;
    error_log /var/log/nginx/orga_error.log warn;

    # Client settings
    client_max_body_size 10M;
    client_body_timeout 12;
    client_header_timeout 12;
    keepalive_timeout 15;
    send_timeout 10;

    # Rate limiting (basic protection)
    limit_req zone=general burst=20 nodelay;
}