baseURL: "https://orga.folkup.app/"
theme: "blowfish"
defaultContentLanguage: en

enableRobotsTXT: false
disableHugoGeneratorInject: true
summaryLength: 0
buildDrafts: false
buildFuture: false
enableEmoji: true

pagination:
  pagerSize: 20

imaging:
  anchor: Center

taxonomies:
  tag: tags
  category: categories
  series: series

sitemap:
  changefreq: weekly
  filename: sitemap.xml
  priority: 0.5

outputs:
  home: ["HTML", "RSS", "JSON"]

markup:
  goldmark:
    renderer:
      unsafe: true
    extensions:
      extras:
        mark:
          enable: true
        superscript:
          enable: true
        subscript:
          enable: true
    parser:
      attribute:
        block: true
  highlight:
    lineNumbersInTable: false
    noClasses: false

related:
  threshold: 0
  toLower: false
  indices:
    - name: tags
      weight: 100
    - name: categories
      weight: 100
    - name: series
      weight: 50
    - name: date
      weight: 10
    - name: fragmentrefs
      type: fragments
      applyFilter: false
      weight: 10
