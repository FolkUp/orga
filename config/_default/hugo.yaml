baseURL: "https://orga.folkup.app/"
theme: "blowfish"
defaultContentLanguage: en

# Production Excellence Configuration
enableRobotsTXT: true
disableHugoGeneratorInject: true
summaryLength: 0
buildDrafts: false
buildFuture: false
enableEmoji: true
enableGitInfo: true
canonifyURLs: true

# Performance & SEO
googleAnalytics: "G-FOLKUP-ORGA"
minify:
  disableCSS: false
  disableHTML: false
  disableJS: false
  disableJSON: false
  disableSVG: false
  disableXML: false
  minifyOutput: true
  tdewolff:
    css:
      version: 1
      precision: 2
    html:
      keepSpecialComments: false
      keepDefaultAttrVals: false
      keepDocumentTags: false
      keepWhitespace: false
    js:
      keepVarNames: false
      precision: 2

pagination:
  pagerSize: 20

# Enhanced Image Processing - ProPublica Level
imaging:
  anchor: Center
  quality: 85
  resampleFilter: lanczos
  webp:
    quality: 85
    lossless: false

taxonomies:
  tag: tags
  category: categories
  series: series

sitemap:
  changefreq: weekly
  filename: sitemap.xml
  priority: 0.5

outputs:
  home: ["HTML", "RSS", "JSON"]

markup:
  goldmark:
    renderer:
      unsafe: true
    extensions:
      extras:
        mark:
          enable: true
        superscript:
          enable: true
        subscript:
          enable: true
    parser:
      attribute:
        block: true
  highlight:
    lineNumbersInTable: false
    noClasses: false

related:
  threshold: 0
  toLower: false
  indices:
    - name: tags
      weight: 100
    - name: categories
      weight: 100
    - name: series
      weight: 50
    - name: date
      weight: 10
    - name: fragmentrefs
      type: fragments
      applyFilter: false
      weight: 10
