<svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Safety Hazard Equipment Marker - Industrial Safety Protocol -->
  <defs>
    <linearGradient id="hazard-frame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A365D"/>
      <stop offset="100%" stop-color="#2D5282"/>
    </linearGradient>
    <linearGradient id="hazard-stripe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D69E2E"/>
      <stop offset="100%" stop-color="#F6E05E"/>
    </linearGradient>
  </defs>

  <!-- Hazard Marker Frame - Angular Soviet Industrial -->
  <polygon points="3,3 13,3 13,13 3,13" fill="url(#hazard-frame)" stroke="#1A365D" stroke-width="0.5"/>

  <!-- Diagonal Hazard Stripes - Constructivist Warning Pattern -->
  <polygon points="4,4 6,4 12,10 10,12 4,6" fill="url(#hazard-stripe)"/>
  <polygon points="8,4 10,4 12,6 12,8 8,4" fill="url(#hazard-stripe)" opacity="0.8"/>
  <polygon points="4,8 4,10 6,12 8,12 4,8" fill="url(#hazard-stripe)" opacity="0.8"/>

  <!-- Safety Classification Border -->
  <rect x="3" y="2" width="10" height="1" fill="#D69E2E"/>
  <rect x="2" y="3" width="1" height="10" fill="#D69E2E"/>
  <rect x="13" y="3" width="1" height="10" fill="#D69E2E"/>

  <!-- Equipment Safety Level -->
  <rect x="1" y="14" width="1" height="1" fill="#D69E2E"/>
  <rect x="3" y="14" width="1" height="1" fill="#D69E2E"/>
  <rect x="5" y="14" width="1" height="1" fill="#D69E2E"/>

  <!-- Safety Protocol Designation -->
  <text x="8" y="15" font-family="monospace" font-size="1" fill="#D69E2E" opacity="0.7" text-anchor="middle">ОПАС</text>
</svg>