<svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Emergency Research Protocol Indicator - Angular Warning System -->
  <defs>
    <linearGradient id="alert-housing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A365D"/>
      <stop offset="100%" stop-color="#2D5282"/>
    </linearGradient>
    <linearGradient id="emergency-signal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D69E2E"/>
      <stop offset="100%" stop-color="#F6E05E"/>
    </linearGradient>
  </defs>

  <!-- Alert Triangle Base - Constructivist Warning Geometry -->
  <polygon points="8,2 14,12 2,12" fill="url(#alert-housing)" stroke="#1A365D" stroke-width="0.5"/>

  <!-- Emergency Exclamation - Angular Industrial Design -->
  <rect x="7.5" y="5" width="1" height="4" fill="url(#emergency-signal)"/>
  <rect x="7.5" y="10" width="1" height="1" fill="url(#emergency-signal)"/>

  <!-- Protocol Level Indicators -->
  <polygon points="6,11 7,11 6.5,9.5" fill="#D69E2E" opacity="0.6"/>
  <polygon points="9,11 10,11 9.5,9.5" fill="#D69E2E" opacity="0.6"/>

  <!-- Emergency Mounting Brackets -->
  <rect x="1" y="12" width="2" height="1" fill="url(#alert-housing)"/>
  <rect x="13" y="12" width="2" height="1" fill="url(#alert-housing)"/>

  <!-- Soviet Classification Badge -->
  <rect x="3" y="13" width="3" height="1" fill="#D69E2E"/>

  <!-- Research Protocol Code -->
  <text x="11" y="15" font-family="monospace" font-size="1" fill="#D69E2E" opacity="0.7">АВАР</text>
</svg>