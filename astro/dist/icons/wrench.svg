<svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Industrial Maintenance Tool - Angular Constructivist Design -->
  <defs>
    <linearGradient id="wrench-body" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A365D"/>
      <stop offset="100%" stop-color="#2D5282"/>
    </linearGradient>
    <linearGradient id="wrench-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D69E2E"/>
      <stop offset="100%" stop-color="#F6E05E"/>
    </linearGradient>
  </defs>

  <!-- Wrench Handle - Angular Industrial Form -->
  <polygon points="2,14 4,14 4,8 2,8" fill="url(#wrench-body)" stroke="#1A365D" stroke-width="0.5"/>

  <!-- Wrench Head - Constructivist Geometry -->
  <polygon points="4,8 6,8 6,6 8,6 8,4 10,4 10,2 8,2 8,4 6,4 6,6 4,6" fill="url(#wrench-body)" stroke="#1A365D" stroke-width="0.5"/>

  <!-- Angular Jaw - Industrial Precision -->
  <polygon points="8,2 10,2 12,4 10,4 8,4" fill="url(#wrench-body)" stroke="#1A365D" stroke-width="0.5"/>
  <polygon points="10,4 12,4 14,6 12,6 10,6" fill="url(#wrench-accent)" stroke="#D69E2E" stroke-width="0.5"/>

  <!-- Soviet Classification Marker -->
  <rect x="2" y="12" width="2" height="1" fill="#D69E2E"/>

  <!-- Industrial Grip Texture -->
  <rect x="2.5" y="9" width="1" height="0.5" fill="#D69E2E" opacity="0.8"/>
  <rect x="2.5" y="10" width="1" height="0.5" fill="#D69E2E" opacity="0.6"/>
  <rect x="2.5" y="11" width="1" height="0.5" fill="#D69E2E" opacity="0.4"/>

  <!-- Equipment Serial Number -->
  <text x="5" y="15" font-family="monospace" font-size="1" fill="#D69E2E" opacity="0.7">ИНСТ</text>
</svg>