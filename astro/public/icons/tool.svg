<svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Multi-purpose Research Instrument Kit - Modular Soviet Tool -->
  <defs>
    <linearGradient id="tool-body" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A365D"/>
      <stop offset="100%" stop-color="#2D5282"/>
    </linearGradient>
    <linearGradient id="tool-functions" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D69E2E"/>
      <stop offset="100%" stop-color="#F6E05E"/>
    </linearGradient>
  </defs>

  <!-- Main Tool Body - Angular Research Instrument -->
  <polygon points="3,6 7,6 7,14 3,14" fill="url(#tool-body)" stroke="#1A365D" stroke-width="0.5"/>

  <!-- Multi-function Head - Constructivist Tool Assembly -->
  <polygon points="7,6 11,6 11,4 13,4 13,2 9,2 9,4 7,4" fill="url(#tool-body)" stroke="#1A365D" stroke-width="0.5"/>

  <!-- Research Probe Extension -->
  <polygon points="11,4 13,4 15,6 13,6 11,6" fill="url(#tool-functions)" stroke="#D69E2E" stroke-width="0.5"/>

  <!-- Measurement Scale - Precision Markings -->
  <rect x="4" y="7" width="2" height="0.5" fill="#D69E2E" opacity="0.8"/>
  <rect x="4" y="8.5" width="2" height="0.5" fill="#D69E2E" opacity="0.6"/>
  <rect x="4" y="10" width="2" height="0.5" fill="#D69E2E" opacity="0.4"/>

  <!-- Modular Attachments - Soviet Engineering -->
  <polygon points="1,8 3,8 3,10 1,10" fill="url(#tool-functions)" stroke="#D69E2E" stroke-width="0.3"/>
  <polygon points="7,8 9,8 9,10 7,10" fill="url(#tool-functions)" stroke="#D69E2E" stroke-width="0.3"/>

  <!-- Research Classification Badge -->
  <rect x="3" y="13" width="4" height="1" fill="#D69E2E"/>

  <!-- Tool Kit Serial Number -->
  <text x="5" y="15" font-family="monospace" font-size="1" fill="#D69E2E" opacity="0.7" text-anchor="middle">ИНСТ</text>
</svg>