<svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Information Access Terminal - Underground Academia Classification System -->
  <defs>
    <linearGradient id="terminal-housing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A365D"/>
      <stop offset="100%" stop-color="#2D5282"/>
    </linearGradient>
    <linearGradient id="data-stream" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D69E2E"/>
      <stop offset="100%" stop-color="#F6E05E"/>
    </linearGradient>
  </defs>

  <!-- Terminal Housing - Angular Soviet Form -->
  <polygon points="3,2 13,2 13,12 3,12" fill="url(#terminal-housing)" stroke="#1A365D" stroke-width="0.5"/>

  <!-- Data Access Screen - Constructivist Display -->
  <rect x="4" y="3" width="8" height="6" fill="#0F172A" stroke="#D69E2E" stroke-width="0.5"/>

  <!-- Information Symbol - Angular "i" -->
  <rect x="7.5" y="4" width="1" height="1" fill="url(#data-stream)"/>
  <rect x="7.5" y="6" width="1" height="3" fill="url(#data-stream)"/>

  <!-- Classification Level Indicator -->
  <rect x="3" y="13" width="2" height="1" fill="#D69E2E"/>
  <rect x="6" y="13" width="2" height="1" fill="#D69E2E"/>
  <rect x="9" y="13" width="2" height="1" fill="#D69E2E"/>

  <!-- Data Port Access -->
  <rect x="2" y="5" width="1" height="2" fill="#D69E2E" opacity="0.8"/>
  <rect x="13" y="5" width="1" height="2" fill="#D69E2E" opacity="0.8"/>

  <!-- Terminal Designation -->
  <text x="7" y="15" font-family="monospace" font-size="1" fill="#D69E2E" opacity="0.7" text-anchor="middle">ИНФО</text>
</svg>