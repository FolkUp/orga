<svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Advanced Soviet Laboratory Analysis Device - Research Microscope -->
  <defs>
    <linearGradient id="microscope-body" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A365D"/>
      <stop offset="100%" stop-color="#2D5282"/>
    </linearGradient>
    <linearGradient id="optics-lens" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D69E2E"/>
      <stop offset="100%" stop-color="#F6E05E"/>
    </linearGradient>
  </defs>

  <!-- Microscope Base - Angular Soviet Laboratory Equipment -->
  <polygon points="2,13 14,13 14,14 2,14" fill="url(#microscope-body)" stroke="#1A365D" stroke-width="0.5"/>

  <!-- Microscope Column - Constructivist Vertical Support -->
  <rect x="3" y="8" width="2" height="5" fill="url(#microscope-body)" stroke="#1A365D" stroke-width="0.5"/>

  <!-- Objective Turret - Angular Analysis Head -->
  <polygon points="5,8 9,8 9,10 5,10" fill="url(#microscope-body)" stroke="#1A365D" stroke-width="0.5"/>

  <!-- Optical System - Precision Eyepiece -->
  <polygon points="8,4 12,4 12,8 8,8" fill="url(#microscope-body)" stroke="#1A365D" stroke-width="0.5"/>

  <!-- Laboratory Lens Assembly -->
  <rect x="9" y="2" width="2" height="2" fill="url(#optics-lens)" stroke="#D69E2E" stroke-width="0.5"/>

  <!-- Analysis Stage - Sample Platform -->
  <rect x="5" y="10" width="4" height="1" fill="url(#optics-lens)"/>

  <!-- Precision Controls - Soviet Engineering -->
  <rect x="6" y="6" width="1" height="2" fill="#D69E2E" opacity="0.8"/>
  <rect x="7.5" y="6" width="0.5" height="2" fill="#D69E2E" opacity="0.6"/>

  <!-- Research Classification Markers -->
  <rect x="2" y="12" width="2" height="1" fill="#D69E2E"/>
  <rect x="5" y="12" width="2" height="1" fill="#D69E2E"/>

  <!-- Soviet Laboratory Designation -->
  <text x="11" y="15" font-family="monospace" font-size="1" fill="#D69E2E" opacity="0.7">МИКР</text>
</svg>