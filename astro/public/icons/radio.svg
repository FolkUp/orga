<svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Underground Communication Equipment - Soviet Radio Transmitter -->
  <defs>
    <linearGradient id="radio-chassis" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A365D"/>
      <stop offset="100%" stop-color="#2D5282"/>
    </linearGradient>
    <linearGradient id="frequency-bands" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D69E2E"/>
      <stop offset="100%" stop-color="#F6E05E"/>
    </linearGradient>
  </defs>

  <!-- Radio Chassis - Angular Underground Equipment -->
  <polygon points="2,8 14,8 14,14 2,14" fill="url(#radio-chassis)" stroke="#1A365D" stroke-width="0.5"/>

  <!-- Antenna Array - Constructivist Communication Design -->
  <rect x="3" y="2" width="0.5" height="6" fill="url(#frequency-bands)"/>
  <rect x="5" y="3" width="0.5" height="5" fill="url(#frequency-bands)" opacity="0.8"/>
  <rect x="7" y="4" width="0.5" height="4" fill="url(#frequency-bands)" opacity="0.6"/>

  <!-- Frequency Dial - Soviet Radio Interface -->
  <rect x="9" y="9" width="4" height="3" fill="#0F172A" stroke="#D69E2E" stroke-width="0.5"/>

  <!-- Signal Strength Indicators -->
  <rect x="10" y="10" width="0.5" height="1" fill="url(#frequency-bands)"/>
  <rect x="11" y="10" width="0.5" height="1.5" fill="url(#frequency-bands)" opacity="0.8"/>
  <rect x="12" y="10" width="0.5" height="2" fill="url(#frequency-bands)" opacity="0.6"/>

  <!-- Underground Network Markers -->
  <rect x="3" y="9" width="2" height="1" fill="#D69E2E" opacity="0.8"/>
  <rect x="3" y="11" width="2" height="1" fill="#D69E2E" opacity="0.6"/>

  <!-- Communication Protocol Indicators -->
  <rect x="1" y="13" width="1" height="1" fill="#D69E2E"/>
  <rect x="14" y="13" width="1" height="1" fill="#D69E2E"/>

  <!-- Radio Equipment Classification -->
  <text x="6" y="15" font-family="monospace" font-size="1" fill="#D69E2E" opacity="0.7" text-anchor="middle">СВЯЗЬ</text>
</svg>