{{ if .IsHome -}}
  <script type="application/ld+json">
  [{
    "@context": "https://schema.org",
    "@type": "WebSite",
    "@id": {{ site.Home.Permalink | safeURL }},
    "name": "{{ .Site.Title | safeJS }}",
    {{ with .Site.Params.description }}"description": "{{ . | safeJS }}",{{ end }}
    {{ with .Site.LanguageCode }}"inLanguage": "{{ . }}",{{ end }}
    "url": {{ site.Home.Permalink | safeURL }},
    {{ with .Site.Params.keywords }}"keywords": {{ . }},{{ end }}
    "publisher": {
      "@type": "Organization",
      "name": "Lucerna OSINT",
      "url": {{ site.Home.Permalink | safeURL }},
      "logo": {
        "@type": "ImageObject",
        "url": "{{ "img/folkup-wordmark-auto.svg" | absURL }}"
      }
    }
  },
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "@id": "{{ "#organization" | absURL }}",
    "name": "Lucerna OSINT",
    "url": {{ site.Home.Permalink | safeURL }},
    "logo": {
      "@type": "ImageObject",
      "url": "{{ "img/folkup-wordmark-auto.svg" | absURL }}"
    },
    "description": "Independent OSINT research hub. Transparent methodology, reproducible investigations, multi-language coverage.",
    "sameAs": [
      "https://github.com/FolkUp",
      "https://ko-fi.com/folkup"
    ]
  }]
  </script>
{{ else }}
  {{- $iso8601 := "2006-01-02T15:04:05-07:00" -}}
  <script type="application/ld+json">
  [{
    "@context": "https://schema.org",
    "@type": "Article",
    "articleSection": "{{ (site.GetPage .Section).Title | safeJS }}",
    "name": "{{ .Title | safeJS }}",
    "headline": "{{ .Title | safeJS }}",
    {{ with .Description }}"description": "{{ . | safeJS }}",{{ end }}
    {{ with .Site.LanguageCode }}"inLanguage": "{{ . }}",{{ end }}
    "url" : {{ .Permalink }},
    "author" : {
      "@type": "Organization",
      "name": "Lucerna OSINT",
      "url": {{ site.Home.Permalink | safeURL }}
    },
    "publisher": {
      "@type": "Organization",
      "name": "Lucerna OSINT",
      "url": {{ site.Home.Permalink | safeURL }},
      "logo": {
        "@type": "ImageObject",
        "url": "{{ "img/folkup-wordmark-auto.svg" | absURL }}"
      }
    },
    {{ with .PublishDate }}"copyrightYear": "{{ .Format "2006" }}",{{ end }}
    {{ with .Date }}"dateCreated": "{{ .Format $iso8601 }}",{{ end }}
    {{ with .PublishDate }}"datePublished": "{{ .Format $iso8601 }}",{{ end }}
    {{ with .ExpiryDate }}"expires": "{{ .Format $iso8601 }}",{{ end }}
    {{ with .Lastmod }}"dateModified": "{{ .Format $iso8601 }}",{{ end }}
    {{ if .Keywords }}
    {{ with .Keywords }}"keywords": {{ . }},{{ end }}
    {{ else }}
    {{ with .Params.tags }}"keywords": {{ . }},{{ end }}
    {{ end }}
    "mainEntityOfPage": "true",
    "wordCount": "{{ .WordCount }}",
    {{ if .Summary }}"articleBody": "{{ .Summary | plainify | safeJS }}",{{ end }}
    {{ with .Params.about }}"about": {{ . | safeJS }},{{ end }}
    {{ with .Params.mentions }}"mentions": {{ . | safeJS }},{{ end }}
    "isAccessibleForFree": true,
    "copyrightHolder": {
      "@type": "Organization",
      "name": "FolkUp",
      "url": "https://folkup.app/"
    }
  }{{ if site.Params.enableStructuredBreadcrumbs | default false }},
  {
    "@context": "https://schema.org",
    "@type": "BreadcrumbList",
    "itemListElement": [
      {{- $position := 0 -}}
      {{- range .Ancestors -}}
        {{- if not .IsHome -}}
          {{- $position = add $position 1 -}}
          {
            "@type": "ListItem",
            "position": {{ $position }},
            "name": "{{ .Title }}",
            "item": {{ .Permalink }}
          },
        {{- end -}}
      {{- end -}}
      {{- $position = add $position 1 -}}
      {
        "@type": "ListItem",
        "position": {{ $position }},
        "name": "{{ .Title }}",
        "item": {{ .Permalink }}
      }
    ]
  }{{ end }}]
  </script>
{{ end }}
