{{ define "main" }}
  <article class="services-page">

    {{/* ═══ HEADER ═══ */}}
    <header class="services-header">
      <div class="services-header__accent" aria-hidden="true"></div>
      <h1 class="services-header__title">{{ .Title }}</h1>
      {{ with .Description }}
        <p class="services-header__subtitle">{{ . }}</p>
      {{ end }}
      <div class="services-header__divider" aria-hidden="true"></div>
    </header>

    {{/* ═══ CONTENT (rendered from _index.md) ═══ */}}
    <div class="services-content prose dark:prose-invert max-w-none">
      {{ .Content }}
    </div>

  </article>
{{ end }}
