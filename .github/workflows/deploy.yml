name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: astro
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies (fresh, no lockfile)
        # The committed package-lock.json was generated on win32 and lacks
        # @rollup/rollup-linux-x64-gnu; both `npm ci` and `npm install` honor
        # the lockfile too strictly and fail at build. Regenerating on the
        # linux runner picks up correct platform-specific optional deps.
        # `--legacy-peer-deps` accepts @astrojs/svelte@6 peer astro@^4 mismatch
        # (project on astro@5 — runtime fine, only resolver complains).
        # Lockfile drift is tracked as a separate cleanup task.
        run: |
          rm -f package-lock.json
          npm install --legacy-peer-deps

      - name: Build Astro site
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy astro/dist --project-name orga-underground-academia --branch main --commit-dirty=true
          workingDirectory: .
