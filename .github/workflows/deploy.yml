name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: astro
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'astro/package-lock.json'

      - name: Install dependencies
        # Clean lockfile generated on Windows with correct cross-platform
        # dependency resolution. No longer requires lockfile regeneration
        # or --legacy-peer-deps flag (peer dependency conflicts resolved).
        run: npm ci
        env:
          HUSKY: 0

      - name: Build Astro site
        run: |
          BUILD_START_TIME=$(date +%s%3N)
          export BUILD_START_TIME
          npm run build:ci
          node scripts/build-monitor.js

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy astro/dist --project-name orga-underground-academia --branch main --commit-dirty=true
          workingDirectory: .
