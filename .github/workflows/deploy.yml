name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: astro
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: astro/package-lock.json

      - name: Install dependencies
        # @astrojs/svelte@6 declares peer astro@^4 but project uses astro@5
        # (works at runtime, only npm strict resolver complains). Upgrading
        # the svelte adapter is a separate task; --legacy-peer-deps unblocks CI.
        run: npm ci --legacy-peer-deps

      - name: Build Astro site
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy astro/dist --project-name orga-underground-academia --branch main --commit-dirty=true
          workingDirectory: .
